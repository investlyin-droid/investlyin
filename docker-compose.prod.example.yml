# Example production override for Hostinger VPS (or any VPS).
# Copy to docker-compose.prod.yml and set your domain and secrets.
#
# Usage:
#   1. Set backend/.env (MONGO_URI, REDIS_*, JWT_SECRET, ALLOWED_ORIGINS, Firebase, etc.)
#   2. Build frontend with API URL:
#        cd frontend && NEXT_PUBLIC_API_URL=https://api.yourdomain.com NEXT_PUBLIC_WS_URL=wss://api.yourdomain.com npm run build && cd ..
#   3. Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Or use build args (recommended) so the frontend image is built with correct API URL:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml build --build-arg NEXT_PUBLIC_API_URL=https://api.yourdomain.com --build-arg NEXT_PUBLIC_WS_URL=wss://api.yourdomain.com
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  backend:
    env_file: ./backend/.env
    environment:
      PORT: "3000"
      NODE_ENV: production
    # Uncomment to restrict to localhost (Nginx will proxy)
    # ports:
    #   - "127.0.0.1:3001:3000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://api.yourdomain.com
        NEXT_PUBLIC_WS_URL: wss://api.yourdomain.com
    environment:
      NEXT_PUBLIC_API_URL: https://api.yourdomain.com
      NEXT_PUBLIC_WS_URL: wss://api.yourdomain.com
    # Uncomment to bind only to localhost
    # ports:
    #   - "127.0.0.1:3000:3000"
