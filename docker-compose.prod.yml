# Production override for www.investlyin.com on Hostinger VPS (or any VPS).
# Requires backend/.env with MONGO_URI, JWT_SECRET, ALLOWED_ORIGINS, Firebase, ADMIN_EMAIL, etc.
#
# Usage:
#   1. On VPS: clone repo, create backend/.env from backend/.env.example (set production values).
#   2. Firebase: set FIREBASE_SERVICE_ACCOUNT_JSON in backend/.env (full JSON string) OR mount key file (see volumes below).
#   3. Build and run:
#      docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache
#      docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   4. Put Nginx (or Caddy) in front: www.investlyin.com -> :3000, api.investlyin.com -> :3001, then SSL (e.g. certbot).

services:
  backend:
    env_file: ./backend/.env
    environment:
      PORT: "3000"
      NODE_ENV: production
    volumes:
      - backend_uploads:/app/uploads
    # Uncomment to bind only to localhost (when using Nginx reverse proxy)
    # ports:
    #   - "127.0.0.1:3001:3000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.investlyin.com}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.investlyin.com}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.investlyin.com}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.investlyin.com}
    # Uncomment to bind only to localhost
    # ports:
    #   - "127.0.0.1:3000:3000"

volumes:
  backend_uploads:
