# version is obsolete in Compose V2; omit to avoid warning
services:
  backend:
    build: ./backend
    container_name: investlyin_backend
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      # Env variables will be loaded from .env file via docker-compose.prod.yml

    depends_on:
      - mongo
      - redis
    networks:
      - investlyin_net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_WS_URL: ws://localhost:3001
    container_name: investlyin_frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    depends_on:
      - backend
    networks:
      - investlyin_net

  mongo:
    image: mongo:6.0
    container_name: investlyin_mongo
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: securepassword123
    volumes:
      - mongo_data:/data/db
    networks:
      - investlyin_net

  redis:
    image: redis:7.0-alpine
    container_name: investlyin_redis
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --requirepass securepassword123
    volumes:
      - redis_data:/data
    networks:
      - investlyin_net

volumes:
  mongo_data:
  redis_data:


networks:
  investlyin_net:
    driver: bridge
